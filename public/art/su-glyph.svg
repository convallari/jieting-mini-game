<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-labelledby="title desc">
  <title id="title">谡 · 墨阵字形动画</title>
  <desc id="desc">抽象化的谡字从墨雾中聚合，发生错位切片与朱砂闪烁后复原。</desc>
  <defs>
    <radialGradient id="paper" cx="46%" cy="42%" r="72%">
      <stop offset="0" stop-color="#f0e6d0"/>
      <stop offset=".68" stop-color="#d7c7a8"/>
      <stop offset="1" stop-color="#a99472"/>
    </radialGradient>
    <radialGradient id="red" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#ff725b"/>
      <stop offset=".4" stop-color="#b9251c"/>
      <stop offset="1" stop-color="#5b0707" stop-opacity="0"/>
    </radialGradient>
    <filter id="paperNoise" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency=".72" numOctaves="4" seed="11" result="n"/>
      <feBlend in="SourceGraphic" in2="n" mode="multiply"/>
    </filter>
    <filter id="inkBleed" x="-40%" y="-40%" width="180%" height="180%">
      <feTurbulence type="fractalNoise" baseFrequency=".012 .035" numOctaves="3" seed="19" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="18" xChannelSelector="R" yChannelSelector="B" result="rough"/>
      <feGaussianBlur in="rough" stdDeviation=".55"/>
    </filter>
    <filter id="mist" x="-80%" y="-80%" width="260%" height="260%">
      <feTurbulence type="fractalNoise" baseFrequency=".018" numOctaves="2" seed="6" result="cloud"/>
      <feDisplacementMap in="SourceGraphic" in2="cloud" scale="70"/>
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="13" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="slice1"><rect x="0" y="120" width="800" height="125"/></clipPath>
    <clipPath id="slice2"><rect x="0" y="245" width="800" height="118"/></clipPath>
    <clipPath id="slice3"><rect x="0" y="363" width="800" height="112"/></clipPath>
    <clipPath id="slice4"><rect x="0" y="475" width="800" height="122"/></clipPath>
    <clipPath id="slice5"><rect x="0" y="597" width="800" height="110"/></clipPath>
    <path id="arc" d="M130 492C183 666 382 735 584 654C685 613 727 521 714 421"/>
    <style>
      .glyph{font-family:"STKaiti","KaiTi","FZKai-Z03","Noto Serif CJK SC",serif;font-size:560px;font-weight:700;text-anchor:middle;dominant-baseline:central}
      .slice{transform-box:fill-box;transform-origin:center;animation:fracture 7.2s cubic-bezier(.7,0,.25,1) infinite}
      .s2{animation-name:fracture2}.s3{animation-name:fracture3}.s4{animation-name:fracture4}.s5{animation-name:fracture5}
      @keyframes fracture{0%,26%,72%,100%{transform:translate(0) skewX(0)}38%,50%{transform:translate(-32px,-5px) skewX(-4deg)}58%{transform:translate(13px,2px)}}
      @keyframes fracture2{0%,26%,72%,100%{transform:translate(0)}38%,50%{transform:translate(45px,4px) skewX(5deg)}58%{transform:translate(-17px)}}
      @keyframes fracture3{0%,26%,72%,100%{transform:translate(0) scale(1)}38%,50%{transform:translate(-24px) scale(1.035)}58%{transform:translate(12px)}}
      @keyframes fracture4{0%,26%,72%,100%{transform:translate(0)}38%,50%{transform:translate(38px,-3px) skewX(-3deg)}58%{transform:translate(-10px)}}
      @keyframes fracture5{0%,26%,72%,100%{transform:translate(0)}38%,50%{transform:translate(-20px,5px) skewX(4deg)}58%{transform:translate(8px)}}
      .core{animation:arrive 7.2s cubic-bezier(.22,.75,.2,1) infinite;transform-origin:400px 410px}
      @keyframes arrive{0%{opacity:0;transform:scale(.68) rotate(-5deg);filter:blur(22px)}15%{opacity:1;filter:blur(0)}24%,72%{transform:scale(1) rotate(0)}82%{transform:scale(1.018)}100%{opacity:1;transform:scale(1)}}
      .mist{animation:drift 7.2s ease-in-out infinite;transform-origin:center}
      @keyframes drift{0%{opacity:.05;transform:scale(.55) rotate(0)}18%{opacity:.52}50%{opacity:.17;transform:scale(1.25) rotate(16deg)}100%{opacity:.05;transform:scale(.8) rotate(28deg)}}
      .seal{animation:seal 7.2s ease-out infinite;transform-origin:640px 625px}
      @keyframes seal{0%,43%{opacity:0;transform:scale(2.4) rotate(-14deg)}48%{opacity:1;transform:scale(.86) rotate(2deg)}53%,82%{opacity:.9;transform:scale(1)}100%{opacity:0}}
      .orbit{fill:none;stroke:#8d1b17;stroke-width:2;stroke-dasharray:10 18;opacity:.45;animation:spin 18s linear infinite;transform-origin:400px 400px}
      @keyframes spin{to{transform:rotate(360deg)}}
      .caption{font:18px "Times New Roman",serif;letter-spacing:9px;fill:#3b3026;opacity:.75}
    </style>
  </defs>
  <rect width="800" height="800" fill="url(#paper)"/>
  <rect width="800" height="800" fill="#b9a17c" opacity=".13" filter="url(#paperNoise)"/>
  <circle cx="400" cy="400" r="302" class="orbit"/>
  <circle cx="400" cy="400" r="258" class="orbit" stroke-dasharray="3 24" style="animation-direction:reverse;animation-duration:25s"/>
  <g class="mist" filter="url(#mist)" fill="#17120e">
    <ellipse cx="245" cy="424" rx="155" ry="78"/><ellipse cx="519" cy="348" rx="181" ry="92"/><ellipse cx="425" cy="594" rx="202" ry="57"/>
  </g>
  <g class="core" filter="url(#inkBleed)" fill="#17120e">
    <text class="glyph slice" x="400" y="414" clip-path="url(#slice1)">谡</text>
    <text class="glyph slice s2" x="400" y="414" clip-path="url(#slice2)">谡</text>
    <text class="glyph slice s3" x="400" y="414" clip-path="url(#slice3)">谡</text>
    <text class="glyph slice s4" x="400" y="414" clip-path="url(#slice4)">谡</text>
    <text class="glyph slice s5" x="400" y="414" clip-path="url(#slice5)">谡</text>
  </g>
  <g class="seal">
    <circle cx="640" cy="625" r="76" fill="url(#red)" opacity=".55" filter="url(#glow)"/>
    <rect x="602" y="587" width="76" height="76" rx="6" fill="none" stroke="#8d1714" stroke-width="7" transform="rotate(-5 640 625)"/>
    <path d="M620 606h40M620 624h40M620 642h40M632 602v45M650 602v45" stroke="#8d1714" stroke-width="5" opacity=".88"/>
  </g>
  <text x="400" y="754" text-anchor="middle" class="caption">SU · BROKEN FORM / RETURNING SPIRIT</text>
</svg>
