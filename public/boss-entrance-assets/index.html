<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="icon" href="data:,"><title>Boss Entrance Animation Review</title>
<style>body{margin:0;background:#17191d;color:#eee;font-family:system-ui,sans-serif}header{position:sticky;top:0;background:#17191de8;padding:16px 5vw;z-index:2}h1{font-size:clamp(20px,3vw,34px);margin:0}.grid{padding:18px 4vw 50px;display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,320px),1fr));gap:18px}.card{background:#252932;border:1px solid #3e4654;border-radius:12px;overflow:hidden}.checker{background:#eee}.card video{display:block;width:100%;aspect-ratio:2/1;object-fit:contain}.card h2{font-size:15px;margin:10px 12px 2px}.card p{font-size:12px;color:#aeb7c5;margin:2px 12px 12px}.role{color:#ffd36b;font-weight:700}@media(max-width:480px){.grid{padding:12px}.card video{aspect-ratio:1/1}}</style></head>
<body><header><h1>Boss 出场小动画 · 29 条 · 12fps</h1></header><main class="grid" id="grid"></main><script>
const names=['common_01_darken','common_02_entry_pulse','common_03_name_impact_dust','common_04_boss_bar_drop','common_05_ink_absorb','zh_01_red_footprint','zh_02_red_brush_slash','zh_03_name_write','zh_04_flag_drop','zh_05_flag_flutter','zh_06_wei_soldier_echo','zh_07_boss_step_out','zh_08_iron_smoke_open','zh_09_square_scan_ring','feng_01_water_reverse_tile','feng_02_water_crack','feng_03_giant_feng_slash','feng_04_paper_cut_open','feng_05_blue_river_strip','feng_06_boss_dash_stop','feng_07_fan_water_burst','feng_08_water_target_line','smy_01_corner_cloud','smy_02_star_board_appear','smy_03_chess_piece_drop','smy_04_long_shadow_extend','smy_05_boss_rise_from_shadow','smy_06_name_constellation','smy_07_command_wave'];
const roles=new Set(['zh_07_boss_step_out','feng_06_boss_dash_stop','smy_05_boss_rise_from_shadow']);
grid.innerHTML=names.map(n=>`<article class="card"><div class="checker"><video controls muted loop playsinline preload="metadata" src="${n}/preview.mp4"></video></div><h2>${n}</h2><p class="${roles.has(n)?'role':''}">${roles.has(n)?'外部 Spine 占位：角色本体未包含，等待运行时合成':'透明序列 + timeline.json + notes.txt'}</p></article>`).join('');
</script></body></html>
