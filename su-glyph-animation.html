<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>谡 · 墨阵字形动画</title>
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:#100e0c;color:#e7d9bd;font-family:system-ui,"Microsoft YaHei",sans-serif;overflow:hidden}
    body:before{content:"";position:fixed;inset:0;background:radial-gradient(circle at 50% 38%,#433524 0,transparent 48%),linear-gradient(120deg,#080706,#1b1612);opacity:.9}
    main{position:relative;width:min(86vw,76vh);text-align:center}.frame{position:relative;aspect-ratio:1;padding:10px;background:#2b2119;box-shadow:0 35px 100px #000,0 0 0 1px #7c6645;transform:rotate(-.35deg)}
    .frame:before,.frame:after{content:"";position:absolute;inset:-8px;border:1px solid #6f593b;pointer-events:none}.frame:after{inset:5px;border-color:#392c21}
    object{display:block;width:100%;height:100%;background:#d8c8a9}
    h1{margin:22px 0 4px;font:500 clamp(18px,2.4vw,28px) "STKaiti","KaiTi",serif;letter-spacing:.5em;padding-left:.5em}p{margin:0;font-size:12px;letter-spacing:.22em;color:#89775d}
    button{position:fixed;right:22px;bottom:20px;border:1px solid #766347;background:#191510;color:#cdbb99;padding:9px 14px;cursor:pointer;letter-spacing:.12em}button:hover{background:#2a2119}
  </style>
</head>
<body>
  <main>
    <div class="frame"><object id="art" type="image/svg+xml" data="/art/su-glyph.svg" aria-label="谡字抽象动画"></object></div>
    <h1>谡 · 墨阵</h1><p>聚形 / 裂阵 / 朱印 / 归神</p>
  </main>
  <button id="restart" type="button">重新演化</button>
  <script>document.querySelector('#restart').addEventListener('click',()=>{const art=document.querySelector('#art');const src=art.data;art.data='';requestAnimationFrame(()=>art.data=src+'?t='+Date.now())})</script>
</body>
</html>
